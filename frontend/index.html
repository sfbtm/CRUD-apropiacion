<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestor de Tareas</title>
    <link rel="stylesheet" href="src/styles.css">
</head>
<body class="app">

    <h1 class="app__title">Gestor de Tareas</h1>

    <!-- CREAR -->
    <section class="task-section task-section--create">
        <h2 class="task-section__title">Crear tarea</h2>

        <form class="form form--create" id="form-crear">
            <input 
                type="text" 
                class="form__input"
                id="input-crear" 
                placeholder="Nueva tarea..." 
                required
            >
            <button class="form__button" type="submit">
                Agregar
            </button>
        </form>
    </section>

    <!-- LISTAR -->
    <section class="task-section task-section--list">
        <h2 class="task-section__title">Lista de tareas</h2>

        <ul class="task-list" id="lista-tareas">

            <!-- EJEMPLO DE TAREA -->
            
            <li class="task-list__item" data-id="1">

                <span class="task-list__name">
                    Estudiar JS
                </span>

                <div class="task-list__actions">

                    <button class="task-list__button task-list__button--edit">
                        Editar
                    </button>

                    <button class="task-list__button task-list__button--delete">
                        Eliminar
                    </button>

                </div>

            </li>
            

        </ul>
    </section>
<script src="src/app.js" type="module"></script>
</body>
</html>
